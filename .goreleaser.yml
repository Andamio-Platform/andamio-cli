version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/andamio
    binary: andamio
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    name_template: "andamio_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

homebrew_casks:
  - repository:
      owner: Andamio-Platform
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    # Skip publishing the cask for prerelease tags (e.g. vX.Y.Z-rc.1) so a
    # prerelease never becomes the `brew install` default and validation/test
    # tags can't push a broken cask to the public tap. Real vX.Y.Z tags publish
    # as before.
    skip_upload: "auto"
    homepage: "https://github.com/Andamio-Platform/andamio-cli"
    description: "CLI for the Andamio Protocol"
    binaries:
      - andamio
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/andamio"]
          end

release:
  github:
    owner: Andamio-Platform
    name: andamio-cli
  draft: false
  prerelease: auto
